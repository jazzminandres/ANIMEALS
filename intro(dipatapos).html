<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMEALS | Taste the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #050505;
            color: #fff;
            overflow-x: hidden;
        }

        /* Interactive Canvas Background */
        #hero-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            perspective: 1000px;
        }

        .brand-logo {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: -5px;
            background: linear-gradient(to bottom, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            cursor: default;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brand-logo:hover {
            transform: scale(1.05) rotateX(10deg);
            filter: drop-shadow(0 0 30px rgba(16, 185, 129, 0.5));
        }

        .tagline {
            font-size: 20px;
            font-weight: 300;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Floating Interactive Elements */
        .food-float {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            user-select: none;
            opacity: 0.3;
            transition: 0.1s;
        }

        .cta-group {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .btn-main {
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            font-size: 16px;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .btn-order {
            background: #10b981;
            color: #000;
        }

        .btn-order:hover {
            background: transparent;
            color: #10b981;
            border-color: #10b981;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .btn-explore {
            background: rgba(255,255,255,0.05);
            color: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-explore:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Scroll Indicator */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            color: #10b981;
            font-size: 24px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <div class="hero-section">
        <div class="brand-logo" id="logo">ANIMEALS</div>
        <div class="tagline">Campus Dining, Reimagined.</div>
        
        <div class="cta-group">
            <a href="#" class="btn-main btn-order">ORDER NOW</a>
            <a href="#" class="btn-main btn-explore">EXPLORE KITCHENS</a>
        </div>

        <div class="scroll-down">
            <i class="bi bi-chevron-double-down"></i>
        </div>
    </div>

    <div class="food-float" style="top: 20%; left: 15%;">🍕</div>
    <div class="food-float" style="top: 60%; left: 10%;">🍔</div>
    <div class="food-float" style="top: 15%; right: 15%;">🍜</div>
    <div class="food-float" style="top: 70%; right: 12%;">🍩</div>
    <div class="food-float" style="top: 40%; right: 25%;">🌮</div>

    <script>
        // Interactive Mouse Background
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouse = { x: 0, y: 0 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Move food particles slightly with mouse
            document.querySelectorAll('.food-float').forEach((el, index) => {
                const speed = (index + 1) * 0.02;
                const x = (window.innerWidth / 2 - e.clientX) * speed;
                const y = (window.innerHeight / 2 - e.clientY) * speed;
                el.style.transform = `translate(${x}px, ${y}px) rotate(${x * 0.1}deg)`;
            });
        });

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 600);
            gradient.addColorStop(0, '#10b981');
            gradient.addColorStop(1, '#05966900');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            requestAnimationFrame(draw);
        }

        resize();
        draw();

        // 3D Tilt Logic for Logo
        const logo = document.getElementById('logo');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 25;
            let y = (window.innerHeight / 2 - e.pageY) / 25;
            logo.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
